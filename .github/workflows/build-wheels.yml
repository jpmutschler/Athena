name: Build Wheels

on:
  push:
    tags:
      - "v*"
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Ruff check
        run: ruff check src/ tests/

      - name: Run tests
        run: pytest tests/ -x -q --tb=short --cov --cov-report=term-missing --cov-report=xml:coverage.xml

  build-linux:
    name: Build Linux wheel
    needs: [test]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential autoconf automake libtool

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python build tools
        run: pip install hatch auditwheel

      - name: Build C library
        working-directory: resources/switchtec-user-4.4-rc2
        run: |
          autoreconf -i
          ./configure
          make -j$(nproc)

      - name: Copy native library
        run: |
          src=resources/switchtec-user-4.4-rc2/lib/.libs/libswitchtec.so
          if [ ! -f "$src" ]; then
            echo "ERROR: Expected .so not found at $src"
            ls -la resources/switchtec-user-4.4-rc2/lib/.libs/
            exit 1
          fi
          cp "$src" src/serialcables_switchtec/_native/libswitchtec.so

      - name: Build wheel
        run: hatch build -t wheel

      - name: Repair wheel (manylinux tags + bundled deps)
        run: |
          auditwheel repair dist/*.whl --wheel-dir dist-repaired/

      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: wheel-linux-x86_64
          path: dist-repaired/*.whl

  build-windows:
    name: Build Windows wheel
    needs: [test]
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Set up MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            make
            autoconf
            automake
            libtool

      - name: Build C library
        shell: msys2 {0}
        run: |
          cd resources/switchtec-user-4.4-rc2
          autoreconf -i
          ./configure
          make -j$(nproc)

      - name: Copy native library
        shell: msys2 {0}
        run: |
          src=resources/switchtec-user-4.4-rc2/lib/.libs/switchtec-0.dll
          if [ ! -f "$src" ]; then
            echo "ERROR: Expected DLL not found at $src"
            ls -la resources/switchtec-user-4.4-rc2/lib/.libs/
            exit 1
          fi
          cp "$src" src/serialcables_switchtec/_native/switchtec.dll

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python build tools
        run: pip install hatch

      - name: Build wheel
        run: hatch build -t wheel

      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: wheel-windows-x86_64
          path: dist\*.whl

  publish:
    name: Publish to PyPI
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
